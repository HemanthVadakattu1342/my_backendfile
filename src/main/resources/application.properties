# ===============================
# DATABASE CONFIGURATION
# Use Railway-provided env vars when present; fall back to local defaults.
# ===============================
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:eduerp_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=eduerp_super_secret_key_change_this_in_production_must_be_long_enough_256bits
app.jwt.expiration-ms=86400000

# ===============================
# SERVER
# Bind to platform port if provided (e.g., Railway), else default 8080.
# ===============================
server.port=${PORT:8080}

# ===============================
# CORS (handled in code too)
# ===============================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
